# Weekly freshness check for the custom nested llms.txt.
# If docs.json drifted from the committed llms.txt, the run FAILS with the fix command and
# GitHub emails you. Then run `python3 scripts/generate_llms_txt.py` locally and open a PR.
#
# Read-only by design: this org blocks GitHub Actions from creating PRs (verified), so we
# don't attempt one — the run just alerts you when llms.txt needs regenerating.
name: Check llms.txt freshness

on:
  schedule:
    - cron: "17 6 * * 1"      # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Verify llms.txt matches docs.json
        run: |
          python3 scripts/generate_llms_txt.py --check || {
            echo "::error::llms.txt drifted from docs.json — run 'python3 scripts/generate_llms_txt.py', commit, and open a PR."
            exit 1
          }
