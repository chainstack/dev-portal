# Regenerates the custom nested llms.txt (root + per-section sub-indexes) from docs.json
# and opens a PR if it drifted, keeping llms-txt-coverage current as pages are added/removed.
# Never pushes to main directly — a human reviews/merges the PR (so branch protection and the
# Mintlify preview both apply as usual).
#
# ONE-TIME PREREQUISITE (admin): Settings > Actions > General > Workflow permissions >
#   enable "Allow GitHub Actions to create and approve pull requests".
#   Without it, the regen still runs but `gh pr create` is blocked.
#
# Runs weekly; trigger on demand anytime via the "Run workflow" button (workflow_dispatch),
# e.g. right after adding a new protocol or a batch of pages.
name: Sync llms.txt

on:
  schedule:
    - cron: "17 6 * * 1"      # Mondays 06:17 UTC (off-the-hour: GitHub delays on-the-hour crons)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: llms-txt-sync
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Regenerate nested llms.txt
        run: python3 scripts/generate_llms_txt.py
      - name: Open PR if llms.txt drifted
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "llms.txt already current — no PR needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B chore/llms-txt-sync
          git add -A
          git commit -m "chore(llms.txt): regenerate nested index from docs.json"
          git push -f -u origin chore/llms-txt-sync
          gh pr create --base main --head chore/llms-txt-sync \
            --title "chore(llms.txt): regenerate nested index" \
            --body "Automated regeneration of the nested llms.txt (root + per-section sub-indexes) from docs.json nav, to keep llms-txt-coverage current. Generated by scripts/generate_llms_txt.py via .github/workflows/llms-txt-sync.yml." \
            || echo "PR already open for chore/llms-txt-sync (updated via force-push)."
